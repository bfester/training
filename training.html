<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Training App</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --fg: #eee;
    --accent: #e67e22;
    --btn: #0f3460;
    --btn-hover: #1a4a8a;
    --pause-color: #c0392b;
    --green: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%; width: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ─── START SCREEN ─── */
  #startScreen {
    display: flex; flex-direction: column;
    height: 100%; padding: 16px; gap: 12px;
    overflow-y: auto;
  }
  #startScreen h1 {
    text-align: center; font-size: 2rem;
    margin-bottom: 8px; color: var(--accent);
  }
  .routine-card {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2); border-radius: 12px;
    padding: 16px 20px; min-height: 64px;
  }
  .routine-card .name {
    font-size: 1.3rem; font-weight: 600;
  }
  .routine-card .info {
    font-size: 0.8rem; color: #888; margin-top: 2px;
  }
  .routine-card button {
    background: var(--green); color: #fff; border: none;
    border-radius: 8px; padding: 10px 22px; font-size: 1.1rem;
    font-weight: 700; cursor: pointer; flex-shrink: 0;
  }
  .routine-card .btn-show {
    background: var(--btn); margin-right: 8px; padding: 8px 14px;
    font-size: 0.9rem;
  }
  .routine-preview {
    display: none; padding: 0 16px 12px;
  }
  .routine-preview.open {
    display: block;
  }
  .routine-preview .rp-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 0.85rem;
  }
  .routine-preview .rp-item:last-child { border-bottom: none; }
  .rp-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .rp-name { flex: 1; }
  .rp-value { opacity: 0.5; font-size: 0.78rem; white-space: nowrap; }
  .rp-loop-header {
    font-size: 0.78rem; opacity: 0.4; padding: 6px 0 2px;
    font-weight: 700;
  }

  /* ─── EXERCISE SCREEN ─── */
  #exerciseScreen {
    display: none; flex-direction: column;
    height: 100%; width: 100%;
    position: relative;
  }

  /* Top bar */
  .top-bar {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 8px 10px; position: absolute; top: 0; left: 0; right: 0;
    z-index: 10; pointer-events: none;
    transition: opacity 0.3s;
  }
  .top-bar.hidden, .bottom-bar.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .top-bar.hidden button, .bottom-bar.hidden button {
    pointer-events: none;
  }
  .top-bar button, .bottom-bar button {
    pointer-events: auto;
    background: rgba(15,52,96,0.85); color: #fff; border: none;
    border-radius: 8px; padding: 14px 18px; font-size: 1rem;
    font-weight: 600; cursor: pointer; min-width: 56px; min-height: 66px;
    backdrop-filter: blur(4px);
  }
  .top-bar .hold-exit-btn {
    background: rgba(192,57,43,0.9);
    font-size: 0.85rem; padding: 14px 16px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px; z-index: 10; pointer-events: none;
    transition: opacity 0.3s;
  }
  .pause-btn {
    pointer-events: auto;
    width: 100%;
    padding: 36px;
    font-size: 1.8rem;
    font-weight: 800;
    color: #fff;
  }
  .pause-btn.paused {
    background: rgba(39,174,96,0.9) !important;
  }

  /* Main content */
  .exercise-content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 16px 70px;
    text-align: center;
    transition: background 0.3s;
    width: 100%; height: 100%;
  }

  .exercise-name {
    font-size: clamp(2.75rem, 11.25vw, 5.625rem);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 12px;
    word-break: break-word;
  }

  .exercise-main-value {
    font-size: clamp(8.75rem, 47.5vw, 22.5rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -3px;
    font-variant-numeric: tabular-nums;
  }

  .exercise-sub {
    font-size: clamp(1.875rem, 6.875vw, 3.5rem);
    opacity: 0.7;
    margin-top: 8px;
  }

  .exercise-rep-info {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    opacity: 0.5;
    margin-top: 4px;
  }

  .confirm-btn {
    background: var(--green);
    color: #fff; border: none; border-radius: 16px;
    padding: 20px 48px; font-size: clamp(1.625rem, 6.25vw, 2.5rem);
    font-weight: 800; cursor: pointer;
    margin-top: 20px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .loop-indicator {
    position: absolute;
    bottom: 60px; right: 16px;
    font-size: 0.8rem;
    opacity: 0.4;
  }

  .progress-bar {
    position: absolute; bottom: 0; left: 0;
    height: 3px; background: var(--accent);
    transition: width 0.3s linear;
    z-index: 5;
  }

  /* Pause overlay */
  .pause-overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 5;
    backdrop-filter: blur(2px);
  }
  .pause-overlay.visible { display: block; }

  /* Beep flash */
  .beep-flash {
    animation: flashBorder 0.3s;
  }
  @keyframes flashBorder {
    0% { box-shadow: inset 0 0 0 6px rgba(255,60,60,0.8); }
    100% { box-shadow: inset 0 0 0 0 rgba(255,60,60,0); }
  }
</style>
</head>
<body>

<!-- ════════ START SCREEN ════════ -->
<div id="startScreen">
  <h1>🏋️ Training</h1>
  <div id="routineList"></div>
</div>

<!-- ════════ EXERCISE SCREEN ════════ -->
<div id="exerciseScreen">
  <div class="top-bar">
    <button id="btnPrev" onclick="goPrev()">◀ Prev</button>
    <button id="btnHoldExit" class="hold-exit-btn" style="display:none">Przytrzymaj aby wyjść</button>
    <button id="btnNext" onclick="goNext()">Next ▶</button>
  </div>

  <div class="pause-overlay" id="pauseOverlay"></div>

  <div class="exercise-content" id="exContent" onclick="handleContentTap()">
    <div class="exercise-name" id="exName"></div>
    <div class="exercise-main-value" id="exMain"></div>
    <div class="exercise-sub" id="exSub"></div>
    <div class="exercise-rep-info" id="exRepInfo"></div>
    <button class="confirm-btn" id="confirmBtn" style="display:none" onclick="event.stopPropagation(); confirmExercise()">✓ OK</button>
  </div>

  <div class="loop-indicator" id="loopIndicator"></div>
  <div class="progress-bar" id="progressBar"></div>

  <div class="bottom-bar">
    <button class="pause-btn" id="btnPause" onclick="togglePause()">⏸</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  DEFINIOWANIE RUTYN TRENINGOWYCH
//  Typy ćwiczeń:
//    "time"   – odmierzanie czasu (sekundy). Wartość: totalSeconds
//    "reps"   – powtórzenia z czasem na powtórzenie. Wartość: { count, repTime }
//    "static" – wyświetla ilość, czeka na potwierdzenie. Wartość: count
//
//  Opcje wspólne:
//    name          – nazwa ćwiczenia
//    type          – "time" | "reps" | "static"
//    value         – zależne od typu (patrz wyżej)
//    confirm       – true = wymaga potwierdzenia przez użytkownika (domyślnie false)
//    beep          – true = pikanie ostatnich 3 sekund/powtórzeń (domyślnie true)
//    color         – kolor tła ćwiczenia (domyślnie "#e67e22")
//    tts           – tekst do przeczytania na głos (domyślnie = name)
//
//  Pętle:
//    { loop: N, exercises: [ ... ] }  – powtarza ćwiczenia N razy
// ══════════════════════════════════════════════════════════════

// Kolory: przygotuj = zielony, ćwiczenie = pomarańczowy, odpoczynek = niebieski
const C_PREP = "#27ae60";
const C_EX   = "#e67e22";
const C_REST = "#2980b9";

// Helpery do budowania rutyn
function prep(name, sec)  {
  return {
    name: `Przygotuj: ${name}`,
    tts: `Przygotuj. ${name}`,
    type: "time", value: sec || 15, color: C_PREP
  };
}
function change(name, sec) {
  return { name, tts: name, type: "time", value: sec || 5, color: C_PREP };
}
function rest(sec)   { return { name: "Odpoczynek", type: "time", value: sec, color: C_REST, speakNext: true }; }
function ex(name, type, value, opts) { return { name, type, value, color: C_EX, ...opts }; }

const ROUTINES = [
  {

      ]},

      { loop: 2, exercises: [
        prep("Pompki"),

        rest(45),
      ]},

      prep("Step down"),
      ex("Step down – pierwsza noga", "reps", { count: 15, repTime: 4 }),
      change("Zmień nogę"),
      ex("Step down – druga noga", "reps", { count: 15, repTime: 4 }),
      rest(45),

      { loop: 2, exercises: [
        prep("Wiosłowanie na poręczach"),
        ex("Wiosłowanie na poręczach", "reps", { count: 10, repTime: 4 }, { confirm: true }),
        rest(45),

    ]
  },

  {
    name: "Klatka",
    exercises: [
      prep("Rolowanie pleców"),
      ex("Rolowanie pleców", "time", 120),

      prep("Samolot – pierwsza noga"),
      ex("Samolot – pierwsza noga", "time", 60),
      change("Zmień nogę"),
      ex("Samolot – druga noga", "time", 60),

      { loop: 2, exercises: [
        prep("Split squat"),
        ex("Split squat – pierwsza noga", "reps", { count: 15, repTime: 8 }),
        change("Zmień nogę"),
        ex("Split squat – druga noga", "reps", { count: 15, repTime: 8 }),
        rest(60),
      ]},

      { loop: 2, exercises: [
        prep("Kossack squat"),
        ex("Kossack squat – pierwsza noga", "reps", { count: 15, repTime: 8 }),
        change("Zmień nogę"),
        ex("Kossack squat – druga noga", "reps", { count: 15, repTime: 8 }),
        rest(60),
      ]},

      prep("Ławka rzymska – isohold + ramiona"),
      ex("Ławka rzymska prosto – isohold + unoszenie ramion", "time", 120),
      rest(45),

      { loop: 2, exercises: [
        prep("Ławka rzymska prosto – skłony"),
        ex("Ławka rzymska prosto – skłony", "reps", { count: 12, repTime: 6 }),
        rest(45),
      ]},

      { loop: 2, exercises: [
        prep("Wyciskanie sztangi na ławce"),

    ]
  },

  {
    name: "Mobility",
    exercises: [
      prep("Airbike - Rozgrzewka"),
      ex("Airbike - Rozgrzewka", "time", 240),
      { loop: 4, exercises: [
        ex("Airbike - Szybko", "time", 60, { color: "#c0392b" }),
        ex("Airbike - Wolno", "time", 60, { color: "#2980b9" }),
      ]},
      ex("Airbike - Cooldown", "time", 180, { color: "#27ae60" }),

      // prep("Rice bucket"),
      // ex("Rice bucket", "time", 300),

      { loop: 2, exercises: [
        prep("Otwieranie dłoni – pierwsza ręka"),
        ex("Otwieranie dłoni ze sztangielką – pierwsza ręka", "reps", { count: 10, repTime: 9 }),
        change("Zmień rękę"),
        ex("Otwieranie dłoni ze sztangielką – druga ręka", "reps", { count: 10, repTime: 9 }),
        rest(45),
      ]},

      { loop: 4, exercises: [
        prep("Siad 90/90"),
        ex("Siad 90/90 – unieś stopę", "time", 30),
        ex("Siad 90/90 – kolano do góry", "time", 30),
        ex("Połóż się – noga równolegle do podłogi", "time", 30),
        change("Zmień stronę"),
      ]},

      { loop: 3, exercises: [
        prep("Rozciąganie pośladków w oparciu o ścianę"),
        ex("Rozciąganie pośladków w oparciu o ścianę", "time", 120),
        prep("Przysiady"),
        ex("Przysiady", "reps", { count: 15, repTime: 6 }),
        prep("Przejdź do psa z głową w dół", 15),
        ex("Pies z głową w dół", "time", 45),
      ]},

      prep("Unoszenie nogi z taśmą – zginacz biodra"),
      ex("Unoszenie nogi z taśmą – zginacz biodra", "time", 120),

      prep("Rozciąganie kanapowe"),
      ex("Rozciąganie kanapowe", "time", 120),

      prep("Rozciąganie nogi – taśma tylna"),
      ex("Rozciąganie nogi – taśma tylna", "time", 120),

      prep("Naleśnik stojący – skłony"),
      ex("Naleśnik stojący – skłony", "reps", { count: 10, repTime: 6 }),

      prep("Naleśnik siedzący"),
      ex("Naleśnik siedzący", "time", 120),

      { loop: 3, exercises: [
        prep("Zwisy"),
        ex("Zwisy", "time", 30),

      ]},

      prep("Siad"),
      ex("Siad", "time", 120),
    ]
  }
];

// ══════════════════════════════════════════════════════════════
//  ENGINE
// ══════════════════════════════════════════════════════════════

let flatExercises = [];
let currentIndex = 0;
let isPaused = false;
let timer = null;
let currentTime = 0;
let currentRep = 0;
let waitingConfirm = false;
let audioCtx = null;
let holdTimer = null;
let holdStart = 0;
let exerciseStartedInteraction = false;

// ── Flatten routines ──
function flattenExercises(exercises, parentLoop) {
  const result = [];
  for (const item of exercises) {
    if (item.loop) {
      for (let i = 0; i < item.loop; i++) {
        const sub = flattenExercises(item.exercises, { current: i + 1, total: item.loop });
        result.push(...sub);
      }
    } else {
      result.push({
        ...item,
        beep: item.beep !== undefined ? item.beep : true,
        color: item.color || "#e67e22",
        confirm: item.confirm || false,
        tts: item.tts || item.name,
        loopInfo: parentLoop || null,
      });
    }
  }
  return result;
}

// ── Audio ──
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq = 800, duration = 150, vol = 0.3) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.value = vol;
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000);
  } catch(e) {}
}

function beepFinal() {
  beep(1200, 400, 0.35);
}

function beepCountdown() {
  beep(600, 120, 0.3);
  // Flash
  const el = document.getElementById('exContent');
  el.classList.remove('beep-flash');
  void el.offsetWidth;
  el.classList.add('beep-flash');
}

// Rep phase beep: strong on first tick of rep, soft on all others
function beepRepTick(isStart) {
  if (isStart) {
    // Strong tick – rep start
    beep(700, 100, 0.22);
  } else {
    // Soft tick
    beep(500, 50, 0.07);
  }
}

// ── TTS ──
function speak(text) {
  try {
    if ('speechSynthesis' in window) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'pl-PL';
      u.rate = 1;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }
  } catch(e) {}
}

// ── Format time ──
function fmtTime(s) {
  if (s < 0) s = 0;
  const m = Math.floor(s / 60);
  const sec = s % 60;
  if (m > 0) return `${m}:${String(sec).padStart(2, '0')}`;
  return `${sec}`;
}

// ── UI references ──
const $startScreen = document.getElementById('startScreen');
const $exScreen = document.getElementById('exerciseScreen');
const $exContent = document.getElementById('exContent');
const $exName = document.getElementById('exName');
const $exMain = document.getElementById('exMain');
const $exSub = document.getElementById('exSub');
const $exRepInfo = document.getElementById('exRepInfo');
const $confirmBtn = document.getElementById('confirmBtn');
const $btnPause = document.getElementById('btnPause');
const $btnHoldExit = document.getElementById('btnHoldExit');
const $pauseOverlay = document.getElementById('pauseOverlay');
const $loopIndicator = document.getElementById('loopIndicator');
const $progressBar = document.getElementById('progressBar');
const $topBar = document.querySelector('.top-bar');
const $bottomBar = document.querySelector('.bottom-bar');

// ── Auto-hide bars ──
let barsHideTimeout = null;
const BARS_HIDE_DELAY = 3000;

function showBars() {
  $topBar.classList.remove('hidden');
  $bottomBar.classList.remove('hidden');
  clearTimeout(barsHideTimeout);
  if (!isPaused) {
    barsHideTimeout = setTimeout(() => {
      hideBars();
    }, BARS_HIDE_DELAY);
  }
}

function hideBars() {
  if (isPaused) return; // never hide when paused
  $topBar.classList.add('hidden');
  $bottomBar.classList.add('hidden');
}

// ── Build start screen ──
function buildStartScreen() {
  const list = document.getElementById('routineList');
  list.innerHTML = '';
  ROUTINES.forEach((r, i) => {
    const flat = flattenExercises(r.exercises);
    const totalTime = flat.reduce((s, e) => {
      if (e.type === 'time') return s + e.value;
      if (e.type === 'reps') return s + e.value.count * e.value.repTime;
      return s + 30; // estimate for static
    }, 0);

    const wrapper = document.createElement('div');

    const card = document.createElement('div');
    card.className = 'routine-card';
    card.innerHTML = `
      <div>
        <div class="name">${r.name}</div>
        <div class="info">${flat.length} ćwiczeń · ~${Math.ceil(totalTime/60)} min</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn-show" onclick="togglePreview(this)">Pokaż</button>
        <button onclick="startRoutine(${i})">START</button>
      </div>
    `;
    wrapper.appendChild(card);

    const preview = document.createElement('div');
    preview.className = 'routine-preview';
    preview.innerHTML = buildRoutinePreview(r.exercises, 0);
    wrapper.appendChild(preview);

    list.appendChild(wrapper);
  });
}

function togglePreview(btn) {
  const preview = btn.closest('.routine-card').nextElementSibling;
  const isOpen = preview.classList.toggle('open');
  btn.textContent = isOpen ? 'Ukryj' : 'Pokaż';
}

function buildRoutinePreview(exercises, depth) {
  let html = '';
  for (const item of exercises) {
    if (item.loop) {
      html += `<div class="rp-loop-header" style="padding-left:${depth*12}px">🔁 ×${item.loop}</div>`;
      html += buildRoutinePreview(item.exercises, depth + 1);
    } else {
      const resolved = typeof item === 'function' ? item : item;
      const color = resolved.color || C_EX;
      let valStr = '';
      if (resolved.type === 'time') {
        valStr = fmtTime(resolved.value);
      } else if (resolved.type === 'reps') {
        valStr = `${resolved.value.count}×${resolved.value.repTime}s`;
      } else if (resolved.type === 'static') {
        valStr = `${resolved.value}×`;
      }
      html += `<div class="rp-item" style="padding-left:${depth*12}px">`;
      html += `<span class="rp-dot" style="background:${color}"></span>`;
      html += `<span class="rp-name">${resolved.name}</span>`;
      html += `<span class="rp-value">${valStr}</span>`;
      html += `</div>`;
    }
  }
  return html;
}

// ── Start routine ──
function startRoutine(idx) {
  // Unlock audio context on user interaction
  try { getAudioCtx().resume(); } catch(e) {}

  // Fullscreen on mobile
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }

  flatExercises = flattenExercises(ROUTINES[idx].exercises);
  currentIndex = 0;
  isPaused = false;
  $startScreen.style.display = 'none';
  $exScreen.style.display = 'flex';
  showBars();
  updatePauseUI();
  runExercise();
}

// ── Run current exercise ──
function runExercise() {
  clearInterval(timer);
  waitingConfirm = false;
  exerciseStartedInteraction = false;

  // Don't force-hide bars; just reset the auto-hide timer.
  // If bars are visible (user interaction), they stay for BARS_HIDE_DELAY.
  // If already hidden, nothing changes.
  clearTimeout(barsHideTimeout);
  if (!isPaused) {
    barsHideTimeout = setTimeout(hideBars, BARS_HIDE_DELAY);
  }

  const ex = flatExercises[currentIndex];
  if (!ex) { finishRoutine(); return; }

  // UI
  $exName.textContent = ex.name;
  $exSub.textContent = '';
  $exRepInfo.textContent = '';
  $confirmBtn.style.display = 'none';
  $exContent.style.background = hexToRgba(ex.color, 0.8);
  $progressBar.style.width = `${((currentIndex) / flatExercises.length) * 100}%`;

  // Loop info
  if (ex.loopInfo) {
    $loopIndicator.textContent = `Pętla ${ex.loopInfo.current}/${ex.loopInfo.total}`;
  } else {
    $loopIndicator.textContent = '';
  }

  // TTS
  let ttsText = ex.tts;
  if (ex.speakNext) {
    const nextName = getNextExerciseName();
    if (nextName) ttsText += `. Następne: ${nextName}`;
  }
  speak(ttsText);

  if (ex.type === 'time') {
    startTimeExercise(ex);
  } else if (ex.type === 'reps') {
    startRepsExercise(ex);
  } else if (ex.type === 'static') {
    startStaticExercise(ex);
  }
}

// ── TIME exercise ──
function getNextExerciseName() {
  if (currentIndex + 1 < flatExercises.length) {
    return flatExercises[currentIndex + 1].name;
  }
  return null;
}

function startTimeExercise(ex) {
  currentTime = ex.value;
  $exMain.textContent = fmtTime(currentTime);
  const nextName = getNextExerciseName();
  $exSub.textContent = nextName ? `następne: ${nextName}` : '';

  timer = setInterval(() => {
    if (isPaused) return;
    currentTime--;

    if (ex.beep && currentTime <= 3 && currentTime > 0) beepCountdown();

    if (currentTime <= 0) {
      clearInterval(timer);
      $exMain.textContent = fmtTime(0);
      beepFinal();
      if (ex.confirm) {
        showConfirmButton();
      } else {
        setTimeout(() => advanceExercise(), 500);
      }
      return;
    }

    $exMain.textContent = fmtTime(currentTime);
  }, 1000);
}

// ── REPS exercise ──
// repTime=8 → shows 8,7,6,5,4,3,2,1 → next rep (exactly 8 seconds)
function startRepsExercise(ex) {
  currentRep = 1;
  currentTime = ex.value.repTime;
  updateRepsUI(ex);
  // Initial strong beep for first rep
  if (ex.beep) beepRepTick(true);

  timer = setInterval(() => {
    if (isPaused) return;
    currentTime--;

    if (currentTime <= 0) {
      if (currentRep >= ex.value.count) {
        // Done all reps
        clearInterval(timer);
        beepFinal();
        $exMain.textContent = '✓';
        $exSub.textContent = `${ex.value.count} powtórzeń done`;
        if (ex.confirm) {
          showConfirmButton();
        } else {
          setTimeout(() => advanceExercise(), 500);
        }
        return;
      }
      // Next rep
      currentRep++;
      currentTime = ex.value.repTime;
      if (ex.beep) beepRepTick(true);
    } else {
      // Mid-rep soft tick
      if (ex.beep) beepRepTick(false);
    }

    updateRepsUI(ex);
  }, 1000);
}

function updateRepsUI(ex) {
  $exMain.textContent = fmtTime(currentTime);
  $exSub.textContent = `Rep ${currentRep} / ${ex.value.count}`;
}

// ── STATIC exercise ──
function startStaticExercise(ex) {
  $exMain.textContent = ex.value;
  $exSub.textContent = 'powtórzeń';
  waitingConfirm = true;
  showConfirmButton();
}

// ── Confirm ──
function showConfirmButton() {
  waitingConfirm = true;
  $confirmBtn.style.display = 'inline-block';
}

function confirmExercise() {
  waitingConfirm = false;
  $confirmBtn.style.display = 'none';
  beep(500, 80);
  advanceExercise();
}

function handleContentTap() {
  showBars();
  // When paused, tap only shows bars — use the ▶ button to unpause
  if (isPaused) return;
  if (waitingConfirm) {
    confirmExercise();
  }
}

// ── Navigation ──
function advanceExercise() {
  currentIndex++;
  if (currentIndex >= flatExercises.length) {
    finishRoutine();
  } else {
    runExercise();
  }
}

function goNext() {
  showBars();
  clearInterval(timer);
  beep(400, 60);
  advanceExercise();
}

function goPrev() {
  showBars();
  clearInterval(timer);
  beep(400, 60);

  const ex = flatExercises[currentIndex];
  if (!ex) { currentIndex = Math.max(0, flatExercises.length - 1); runExercise(); return; }

  // Smart prev: if we're past the start of current exercise, restart it
  let atStart = false;
  if (ex.type === 'time' && currentTime >= ex.value) atStart = true;
  if (ex.type === 'reps' && currentRep === 1 && currentTime >= ex.value.repTime) atStart = true;
  if (ex.type === 'static' && !exerciseStartedInteraction) atStart = true;

  if (atStart && currentIndex > 0) {
    currentIndex--;
  }
  runExercise();
}

// ── Pause ──
function togglePause() {
  showBars();
  isPaused = !isPaused;
  updatePauseUI();
  if (!isPaused) {
    try { getAudioCtx().resume(); } catch(e) {}
  }
}

function updatePauseUI() {
  $btnPause.textContent = isPaused ? '▶ Wznów' : '⏸';
  $btnPause.classList.toggle('paused', isPaused);
  $pauseOverlay.classList.toggle('visible', isPaused);
  $btnHoldExit.style.display = isPaused ? 'inline-block' : 'none';
  // showBars handles timeout logic based on isPaused
  showBars();
}

// ── Hold to exit ──
(function setupHoldExit() {
  const btn = $btnHoldExit;
  let active = false;
  let holdTimeout = null;

  function startHold(e) {
    e.preventDefault();
    active = true;
    btn.textContent = 'Trzymaj...';
    holdTimeout = setTimeout(() => {
      if (active) {
        exitToStart();
      }
    }, 1500);
  }
  function endHold(e) {
    e.preventDefault();
    active = false;
    clearTimeout(holdTimeout);
    btn.textContent = 'Przytrzymaj aby wyjść';
  }

  btn.addEventListener('touchstart', startHold, { passive: false });
  btn.addEventListener('mousedown', startHold);
  btn.addEventListener('touchend', endHold);
  btn.addEventListener('touchcancel', endHold);
  btn.addEventListener('mouseup', endHold);
  btn.addEventListener('mouseleave', endHold);
})();

function exitToStart() {
  clearInterval(timer);
  clearTimeout(barsHideTimeout);
  isPaused = false;
  speechSynthesis.cancel();
  $exScreen.style.display = 'none';
  $startScreen.style.display = 'flex';
  $topBar.classList.remove('hidden');
  $bottomBar.classList.remove('hidden');
}

// ── Finish ──
function finishRoutine() {
  clearInterval(timer);
  speak('Trening zakończony. Gratulacje!');
  beepFinal();

  $exName.textContent = '🎉 Koniec!';
  $exMain.textContent = '✓';
  $exSub.textContent = 'Trening zakończony';
  $exRepInfo.textContent = '';
  $confirmBtn.style.display = 'none';
  $exContent.style.background = hexToRgba('#27ae60', 0.25);
  $progressBar.style.width = '100%';
  $loopIndicator.textContent = '';

  waitingConfirm = true;
  const finBtn = document.createElement('button');
  finBtn.className = 'confirm-btn';
  finBtn.textContent = 'Powrót';
  finBtn.onclick = (e) => {
    e.stopPropagation();
    finBtn.remove();
    exitToStart();
  };
  $exContent.appendChild(finBtn);
}

// ── Utils ──
function hexToRgba(hex, alpha) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const r = parseInt(hex.substring(0, 2), 16);
  const g = parseInt(hex.substring(2, 4), 16);
  const b = parseInt(hex.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Prevent screen sleep (if possible) ──
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && $exScreen.style.display === 'flex') {
    requestWakeLock();
  }
});

// ── Keep screen awake during workout ──
const origStartRoutine = startRoutine;
startRoutine = function(idx) {
  requestWakeLock();
  origStartRoutine(idx);
};

// ── Block refresh / back while routine is running ──
function isRoutineActive() {
  return $exScreen.style.display === 'flex';
}
window.addEventListener('beforeunload', (e) => {
  if (isRoutineActive()) {
    e.preventDefault();
    e.returnValue = '';
  }
});
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  if (isRoutineActive()) {
    history.pushState(null, '', location.href);
  }
});

// ── Init ──
buildStartScreen();

// Unlock audio context on first touch
document.addEventListener('touchstart', () => {
  try { getAudioCtx().resume(); } catch(e) {}
}, { once: true });
</script>
