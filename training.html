<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Training App</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --fg: #eee;
    --accent: #e67e22;
    --btn: #0f3460;
    --btn-hover: #1a4a8a;
    --pause-color: #c0392b;
    --green: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%; width: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ─── START SCREEN ─── */
  #startScreen {
    display: flex; flex-direction: column;
    height: 100%; padding: 16px; gap: 12px;
    overflow-y: auto;
  }
  #startScreen h1 {
    text-align: center; font-size: 2rem;
    margin-bottom: 8px; color: var(--accent);
  }
  .routine-card {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2); border-radius: 12px;
    padding: 16px 20px; min-height: 64px;
  }
  .routine-card .name {
    font-size: 1.3rem; font-weight: 600;
  }
  .routine-card .info {
    font-size: 0.8rem; color: #888; margin-top: 2px;
  }
  .routine-card button {
    background: var(--green); color: #fff; border: none;
    border-radius: 8px; padding: 10px 22px; font-size: 1.1rem;
    font-weight: 700; cursor: pointer; flex-shrink: 0;
  }

  /* ─── EXERCISE SCREEN ─── */
  #exerciseScreen {
    display: none; flex-direction: column;
    height: 100%; width: 100%;
    position: relative;
  }

  /* Top bar */
  .top-bar {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 8px 10px; position: absolute; top: 0; left: 0; right: 0;
    z-index: 10; pointer-events: none;
  }
  .top-bar button, .bottom-bar button {
    pointer-events: auto;
    background: rgba(15,52,96,0.85); color: #fff; border: none;
    border-radius: 8px; padding: 8px 14px; font-size: 0.85rem;
    font-weight: 600; cursor: pointer; min-width: 44px; min-height: 44px;
    backdrop-filter: blur(4px);
  }
  .top-bar .hold-exit-btn {
    background: rgba(192,57,43,0.9);
    font-size: 0.75rem; padding: 8px 12px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px; z-index: 10; pointer-events: none;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .pause-btn {
    pointer-events: auto;
  }
  .pause-btn.paused {
    background: rgba(39,174,96,0.9) !important;
  }

  /* Main content */
  .exercise-content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 16px 70px;
    text-align: center;
    transition: background 0.3s;
    width: 100%; height: 100%;
  }

  .exercise-name {
    font-size: clamp(1.8rem, 7vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 12px;
    word-break: break-word;
  }

  .exercise-main-value {
    font-size: clamp(5rem, 28vw, 14rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
  }

  .exercise-sub {
    font-size: clamp(1.2rem, 4vw, 2rem);
    opacity: 0.7;
    margin-top: 8px;
  }

  .exercise-rep-info {
    font-size: clamp(1rem, 3vw, 1.6rem);
    opacity: 0.5;
    margin-top: 4px;
  }

  .confirm-btn {
    background: var(--green);
    color: #fff; border: none; border-radius: 16px;
    padding: 20px 48px; font-size: clamp(1.3rem, 5vw, 2rem);
    font-weight: 800; cursor: pointer;
    margin-top: 20px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .loop-indicator {
    position: absolute;
    bottom: 60px; right: 16px;
    font-size: 0.8rem;
    opacity: 0.4;
  }

  .progress-bar {
    position: absolute; bottom: 0; left: 0;
    height: 3px; background: var(--accent);
    transition: width 0.3s linear;
    z-index: 5;
  }

  /* Pause overlay */
  .pause-overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 5;
    backdrop-filter: blur(2px);
  }
  .pause-overlay.visible { display: block; }

  /* Beep flash */
  .beep-flash {
    animation: flashBorder 0.3s;
  }
  @keyframes flashBorder {
    0% { box-shadow: inset 0 0 0 6px rgba(255,60,60,0.8); }
    100% { box-shadow: inset 0 0 0 0 rgba(255,60,60,0); }
  }
</style>
</head>
<body>

<!-- ════════ START SCREEN ════════ -->
<div id="startScreen">
  <h1>🏋️ Training</h1>
  <div id="routineList"></div>
</div>

<!-- ════════ EXERCISE SCREEN ════════ -->
<div id="exerciseScreen">
  <div class="top-bar">
    <button id="btnPrev" onclick="goPrev()">◀ Prev</button>
    <button id="btnHoldExit" class="hold-exit-btn" style="display:none">Przytrzymaj aby wyjść</button>
    <button id="btnNext" onclick="goNext()">Next ▶</button>
  </div>

  <div class="pause-overlay" id="pauseOverlay"></div>

  <div class="exercise-content" id="exContent" onclick="handleContentTap()">
    <div class="exercise-name" id="exName"></div>
    <div class="exercise-main-value" id="exMain"></div>
    <div class="exercise-sub" id="exSub"></div>
    <div class="exercise-rep-info" id="exRepInfo"></div>
    <button class="confirm-btn" id="confirmBtn" style="display:none" onclick="event.stopPropagation(); confirmExercise()">✓ OK</button>
  </div>

  <div class="loop-indicator" id="loopIndicator"></div>
  <div class="progress-bar" id="progressBar"></div>

  <div class="bottom-bar">
    <button class="pause-btn" id="btnPause" onclick="togglePause()">⏸</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  DEFINIOWANIE RUTYN TRENINGOWYCH
//  Typy ćwiczeń:
//    "time"   – odmierzanie czasu (sekundy). Wartość: totalSeconds
//    "reps"   – powtórzenia z czasem na powtórzenie. Wartość: { count, repTime }
//    "static" – wyświetla ilość, czeka na potwierdzenie. Wartość: count
//
//  Opcje wspólne:
//    name          – nazwa ćwiczenia
//    type          – "time" | "reps" | "static"
//    value         – zależne od typu (patrz wyżej)
//    confirm       – true = wymaga potwierdzenia przez użytkownika (domyślnie false)
//    beep          – true = pikanie ostatnich 3 sekund/powtórzeń (domyślnie true)
//    color         – kolor tła ćwiczenia (domyślnie "#e67e22")
//    tts           – tekst do przeczytania na głos (domyślnie = name)
//
//  Pętle:
//    { loop: N, exercises: [ ... ] }  – powtarza ćwiczenia N razy
// ══════════════════════════════════════════════════════════════

// Kolory: przygotuj = zielony, ćwiczenie = pomarańczowy, odpoczynek = niebieski
const C_PREP = "#27ae60";
const C_EX   = "#e67e22";
const C_REST = "#2980b9";

// Helpery do budowania rutyn
function prep(name)  { return { name: `Przygotuj: ${name}`, tts: `Przygotuj. ${name}`, type: "time", value: 15, color: C_PREP }; }
function rest(sec)   { return { name: "Odpoczynek", type: "time", value: sec, color: C_REST }; }

const ROUTINES = [
  {
    name: "Plecy",
    exercises: [
      // 1x: rolowanie pleców 2min (bez odpoczynku)
      prep("Rolowanie pleców"),
      { name: "Rolowanie pleców", type: "time", value: 120, color: C_EX },

      // 2x: wspięcia na obie stopy zgięte nogi 30×4s + odpoczynek 45s
      {
        loop: 2,
        exercises: [
          prep("Wspięcia na obie stopy – zgięte nogi"),
          { name: "Wspięcia – zgięte nogi", type: "reps", value: { count: 30, repTime: 4 }, color: C_EX },
          rest(45),
        ]
      },

      // 3x: wspięcia proste nogi 30×6s + unoszenie palców 25×3s + odpoczynek 45s
      {
        loop: 3,
        exercises: [
          prep("Wspięcia na obie stopy – proste nogi"),
          { name: "Wspięcia – proste nogi", type: "reps", value: { count: 30, repTime: 6 }, color: C_EX },
          { name: "Unoszenie palców o ścianę", type: "reps", value: { count: 25, repTime: 3 }, color: C_EX },
          rest(45),
        ]
      },

      // 2x: pompki 10×4s + odpoczynek 45s
      {
        loop: 2,
        exercises: [
          prep("Pompki"),
          { name: "Pompki", type: "reps", value: { count: 10, repTime: 4 }, color: C_EX },
          rest(45),
        ]
      },

      // 5x: Wiosłowanie 10×4s + odpoczynek 45s
      {
        loop: 5,
        exercises: [
          prep("Wiosłowanie"),
          { name: "Wiosłowanie", type: "reps", value: { count: 10, repTime: 4 }, color: C_EX },
          rest(45),
        ]
      },

      // 1x: siad 2min (bez odpoczynku)
      prep("Siad"),
      { name: "Siad", type: "time", value: 120, color: C_EX },
    ]
  },
];

// ══════════════════════════════════════════════════════════════
//  ENGINE
// ══════════════════════════════════════════════════════════════

let flatExercises = [];
let currentIndex = 0;
let isPaused = false;
let timer = null;
let currentTime = 0;
let currentRep = 0;
let waitingConfirm = false;
let audioCtx = null;
let holdTimer = null;
let holdStart = 0;
let exerciseStartedInteraction = false;

// ── Flatten routines ──
function flattenExercises(exercises, parentLoop) {
  const result = [];
  for (const item of exercises) {
    if (item.loop) {
      for (let i = 0; i < item.loop; i++) {
        const sub = flattenExercises(item.exercises, { current: i + 1, total: item.loop });
        result.push(...sub);
      }
    } else {
      result.push({
        ...item,
        beep: item.beep !== undefined ? item.beep : true,
        color: item.color || "#e67e22",
        confirm: item.confirm || false,
        tts: item.tts || item.name,
        loopInfo: parentLoop || null,
      });
    }
  }
  return result;
}

// ── Audio ──
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq = 800, duration = 150) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.value = 0.3;
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000);
  } catch(e) {}
}

function beepFinal() {
  beep(1200, 400);
}

function beepCountdown() {
  beep(600, 120);
  // Flash
  const el = document.getElementById('exContent');
  el.classList.remove('beep-flash');
  void el.offsetWidth;
  el.classList.add('beep-flash');
}

// ── TTS ──
function speak(text) {
  try {
    if ('speechSynthesis' in window) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'pl-PL';
      u.rate = 1;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }
  } catch(e) {}
}

// ── Format time ──
function fmtTime(s) {
  if (s < 0) s = 0;
  const m = Math.floor(s / 60);
  const sec = s % 60;
  if (m > 0) return `${m}:${String(sec).padStart(2, '0')}`;
  return `${sec}`;
}

// ── UI references ──
const $startScreen = document.getElementById('startScreen');
const $exScreen = document.getElementById('exerciseScreen');
const $exContent = document.getElementById('exContent');
const $exName = document.getElementById('exName');
const $exMain = document.getElementById('exMain');
const $exSub = document.getElementById('exSub');
const $exRepInfo = document.getElementById('exRepInfo');
const $confirmBtn = document.getElementById('confirmBtn');
const $btnPause = document.getElementById('btnPause');
const $btnHoldExit = document.getElementById('btnHoldExit');
const $pauseOverlay = document.getElementById('pauseOverlay');
const $loopIndicator = document.getElementById('loopIndicator');
const $progressBar = document.getElementById('progressBar');

// ── Build start screen ──
function buildStartScreen() {
  const list = document.getElementById('routineList');
  list.innerHTML = '';
  ROUTINES.forEach((r, i) => {
    const flat = flattenExercises(r.exercises);
    const totalTime = flat.reduce((s, e) => {
      if (e.type === 'time') return s + e.value;
      if (e.type === 'reps') return s + e.value.count * e.value.repTime;
      return s + 30; // estimate for static
    }, 0);
    const card = document.createElement('div');
    card.className = 'routine-card';
    card.innerHTML = `
      <div>
        <div class="name">${r.name}</div>
        <div class="info">${flat.length} ćwiczeń · ~${Math.ceil(totalTime/60)} min</div>
      </div>
      <button onclick="startRoutine(${i})">START</button>
    `;
    list.appendChild(card);
  });
}

// ── Start routine ──
function startRoutine(idx) {
  // Unlock audio context on user interaction
  try { getAudioCtx().resume(); } catch(e) {}

  flatExercises = flattenExercises(ROUTINES[idx].exercises);
  currentIndex = 0;
  isPaused = false;
  $startScreen.style.display = 'none';
  $exScreen.style.display = 'flex';
  updatePauseUI();
  runExercise();
}

// ── Run current exercise ──
function runExercise() {
  clearInterval(timer);
  waitingConfirm = false;
  exerciseStartedInteraction = false;

  const ex = flatExercises[currentIndex];
  if (!ex) { finishRoutine(); return; }

  // UI
  $exName.textContent = ex.name;
  $exSub.textContent = '';
  $exRepInfo.textContent = '';
  $confirmBtn.style.display = 'none';
  $exContent.style.background = hexToRgba(ex.color, 0.2);
  $progressBar.style.width = `${((currentIndex) / flatExercises.length) * 100}%`;

  // Loop info
  if (ex.loopInfo) {
    $loopIndicator.textContent = `Pętla ${ex.loopInfo.current}/${ex.loopInfo.total}`;
  } else {
    $loopIndicator.textContent = '';
  }

  // TTS
  speak(ex.tts);

  if (ex.type === 'time') {
    startTimeExercise(ex);
  } else if (ex.type === 'reps') {
    startRepsExercise(ex);
  } else if (ex.type === 'static') {
    startStaticExercise(ex);
  }
}

// ── TIME exercise ──
function startTimeExercise(ex) {
  currentTime = ex.value;
  $exMain.textContent = fmtTime(currentTime);
  $exSub.textContent = 'sekund';

  timer = setInterval(() => {
    if (isPaused) return;
    currentTime--;

    if (ex.beep && currentTime <= 3 && currentTime > 0) beepCountdown();

    if (currentTime <= 0) {
      clearInterval(timer);
      $exMain.textContent = fmtTime(0);
      beepFinal();
      if (ex.confirm) {
        showConfirmButton();
      } else {
        setTimeout(() => advanceExercise(), 500);
      }
      return;
    }

    $exMain.textContent = fmtTime(currentTime);
  }, 1000);
}

// ── REPS exercise ──
function startRepsExercise(ex) {
  currentRep = 1;
  currentTime = ex.value.repTime;
  updateRepsUI(ex);

  timer = setInterval(() => {
    if (isPaused) return;
    currentTime--;

    if (ex.beep && currentTime <= 3 && currentTime > 0) beepCountdown();

    if (currentTime <= 0) {
      if (currentRep >= ex.value.count) {
        // Done all reps
        clearInterval(timer);
        beepFinal();
        $exMain.textContent = '✓';
        $exSub.textContent = `${ex.value.count} powtórzeń done`;
        if (ex.confirm) {
          showConfirmButton();
        } else {
          setTimeout(() => advanceExercise(), 500);
        }
        return;
      }
      // Next rep
      beep(900, 100);
      currentRep++;
      currentTime = ex.value.repTime;
    }

    updateRepsUI(ex);
  }, 1000);
}

function updateRepsUI(ex) {
  $exMain.textContent = fmtTime(currentTime);
  $exSub.textContent = `Rep ${currentRep} / ${ex.value.count}`;

  // Beep on last 3 reps (when starting a new rep at the boundary)
  if (ex.beep && currentRep > ex.value.count - 3 && currentTime === ex.value.repTime && currentRep > 1) {
    // Visual cue for last reps
  }
}

// ── STATIC exercise ──
function startStaticExercise(ex) {
  $exMain.textContent = ex.value;
  $exSub.textContent = 'powtórzeń';
  waitingConfirm = true;
  showConfirmButton();
}

// ── Confirm ──
function showConfirmButton() {
  waitingConfirm = true;
  $confirmBtn.style.display = 'inline-block';
}

function confirmExercise() {
  waitingConfirm = false;
  $confirmBtn.style.display = 'none';
  beep(500, 80);
  advanceExercise();
}

function handleContentTap() {
  // Tapping the content area also confirms if waiting
  if (waitingConfirm) {
    confirmExercise();
  }
}

// ── Navigation ──
function advanceExercise() {
  currentIndex++;
  if (currentIndex >= flatExercises.length) {
    finishRoutine();
  } else {
    runExercise();
  }
}

function goNext() {
  clearInterval(timer);
  beep(400, 60);
  advanceExercise();
}

function goPrev() {
  clearInterval(timer);
  beep(400, 60);

  const ex = flatExercises[currentIndex];
  if (!ex) { currentIndex = Math.max(0, flatExercises.length - 1); runExercise(); return; }

  // Smart prev: if we're past the start of current exercise, restart it
  let atStart = false;
  if (ex.type === 'time' && currentTime >= ex.value) atStart = true;
  if (ex.type === 'reps' && currentRep === 1 && currentTime >= ex.value.repTime) atStart = true;
  if (ex.type === 'static' && !exerciseStartedInteraction) atStart = true;

  if (atStart && currentIndex > 0) {
    currentIndex--;
  }
  runExercise();
}

// ── Pause ──
function togglePause() {
  isPaused = !isPaused;
  updatePauseUI();
  if (!isPaused) {
    try { getAudioCtx().resume(); } catch(e) {}
  }
}

function updatePauseUI() {
  $btnPause.textContent = isPaused ? '▶' : '⏸';
  $btnPause.classList.toggle('paused', isPaused);
  $pauseOverlay.classList.toggle('visible', isPaused);
  $btnHoldExit.style.display = isPaused ? 'inline-block' : 'none';
}

// ── Hold to exit ──
(function setupHoldExit() {
  const btn = $btnHoldExit;
  let active = false;
  let holdTimeout = null;

  function startHold(e) {
    e.preventDefault();
    active = true;
    btn.textContent = 'Trzymaj...';
    holdTimeout = setTimeout(() => {
      if (active) {
        exitToStart();
      }
    }, 1500);
  }
  function endHold(e) {
    e.preventDefault();
    active = false;
    clearTimeout(holdTimeout);
    btn.textContent = 'Przytrzymaj aby wyjść';
  }

  btn.addEventListener('touchstart', startHold, { passive: false });
  btn.addEventListener('mousedown', startHold);
  btn.addEventListener('touchend', endHold);
  btn.addEventListener('touchcancel', endHold);
  btn.addEventListener('mouseup', endHold);
  btn.addEventListener('mouseleave', endHold);
})();

function exitToStart() {
  clearInterval(timer);
  isPaused = false;
  speechSynthesis.cancel();
  $exScreen.style.display = 'none';
  $startScreen.style.display = 'flex';
}

// ── Finish ──
function finishRoutine() {
  clearInterval(timer);
  speak('Trening zakończony. Gratulacje!');
  beepFinal();

  $exName.textContent = '🎉 Koniec!';
  $exMain.textContent = '✓';
  $exSub.textContent = 'Trening zakończony';
  $exRepInfo.textContent = '';
  $confirmBtn.style.display = 'none';
  $exContent.style.background = hexToRgba('#27ae60', 0.25);
  $progressBar.style.width = '100%';
  $loopIndicator.textContent = '';

  waitingConfirm = true;
  const finBtn = document.createElement('button');
  finBtn.className = 'confirm-btn';
  finBtn.textContent = 'Powrót';
  finBtn.onclick = (e) => {
    e.stopPropagation();
    finBtn.remove();
    exitToStart();
  };
  $exContent.appendChild(finBtn);
}

// ── Utils ──
function hexToRgba(hex, alpha) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const r = parseInt(hex.substring(0, 2), 16);
  const g = parseInt(hex.substring(2, 4), 16);
  const b = parseInt(hex.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Prevent screen sleep (if possible) ──
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && $exScreen.style.display === 'flex') {
    requestWakeLock();
  }
});

// ── Keep screen awake during workout ──
const origStartRoutine = startRoutine;
startRoutine = function(idx) {
  requestWakeLock();
  origStartRoutine(idx);
};

// ── Init ──
buildStartScreen();

// Unlock audio context on first touch
document.addEventListener('touchstart', () => {
  try { getAudioCtx().resume(); } catch(e) {}
}, { once: true });
</script>
</body>
</html>
